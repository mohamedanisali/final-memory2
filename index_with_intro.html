<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدار ذكريات دفعة 29 — كلية التمريض</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        :root {
            --bg: #1c0a0e;
            --burg: #7a1e3c;
            --burg-l: #b03055;
            --cream: #f5ede0;
            --cream-d: rgba(245,237,224,0.7);
            --t: 0.4s cubic-bezier(0.22,1,0.36,1);
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
        body{
            font-family:'Tajawal',sans-serif;
            background: var(--bg);
            color: var(--cream);
            overflow-x: hidden;
            min-height: 100vh;
            padding: 40px 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; text-align: center; }
        h1 { font-family: 'Amiri', serif; font-size: 3.5rem; color: var(--burg-l); margin-bottom: 10px; }
        p.subtitle { color: var(--cream-d); margin-bottom: 40px; font-size: 1.1rem; }

        /* --- INTRO STYLES --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: transform 1s cubic-bezier(0.77, 0, 0.175, 1), opacity 0.8s ease;
        }
        #intro-screen.hidden {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }
        .intro-content {
            text-align: center;
            animation: fadeInOut 3s ease-in-out forwards;
        }
        .intro-title {
            font-family: 'Amiri', serif;
            font-size: 4rem;
            color: var(--burg-l);
            margin-bottom: 20px;
            opacity: 0;
            transform: scale(0.8);
            animation: revealTitle 1.5s cubic-bezier(0.22, 1, 0.36, 1) 0.5s forwards;
        }
        .intro-subtitle {
            font-size: 1.5rem;
            color: var(--cream-d);
            letter-spacing: 2px;
            opacity: 0;
            animation: revealSubtitle 1.5s ease 1s forwards;
        }
        .intro-line {
            width: 0;
            height: 2px;
            background: var(--burg-l);
            margin: 20px auto;
            animation: expandLine 1.5s ease 0.8s forwards;
        }

        @keyframes revealTitle {
            to { opacity: 1; transform: scale(1); }
        }
        @keyframes revealSubtitle {
            to { opacity: 1; }
        }
        @keyframes expandLine {
            to { width: 200px; }
        }
        /* --- END INTRO STYLES --- */

        /* MEMORIES GRID */
        .memories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 20px 0;
        }
        .memory-card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 15px;
            overflow: hidden;
            transition: var(--t);
            position: relative;
            animation: fadeIn 0.8s ease forwards;
        }
        .memory-card:hover {
            transform: translateY(-10px);
            border-color: var(--burg-l);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
        }
        .memory-img {
            width: 100%;
            height: 250px;
            object-fit: cover;
            filter: grayscale(30%);
            transition: var(--t);
        }
        .memory-card:hover .memory-img { filter: grayscale(0%); }
        .memory-name {
            padding: 15px 15px 5px;
            font-weight: 700;
            color: var(--burg-l);
            font-size: 1.2rem;
        }
        .memory-msg {
            padding: 0 15px 15px;
            font-size: 0.95rem;
            color: var(--cream-d);
            line-height: 1.6;
        }
        
        /* DELETE BUTTON STYLE */
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(122, 30, 60, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: 0.3s;
            font-size: 1.2rem;
            z-index: 10;
        }
        .memory-card:hover .delete-btn {
            opacity: 1;
        }
        .delete-btn:hover {
            background: #ff4d4d;
            transform: scale(1.1);
        }

        /* FAB & MODAL */
        .fab {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 65px;
            height: 65px;
            background: var(--burg-l);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 2rem;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            transition: var(--t);
            z-index: 100;
        }
        .fab:hover { transform: scale(1.1) rotate(90deg); background: var(--burg); }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.3s;
            z-index: 1000;
        }
        .modal.active { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #251015;
            padding: 40px;
            border-radius: 20px;
            width: 90%; max-width: 500px;
            position: relative;
            border: 1px solid var(--burg);
        }
        .close-modal {
            position: absolute; top: 20px; left: 20px;
            font-size: 1.5rem; cursor: pointer; color: var(--cream-d);
        }

        .form-group { margin-bottom: 20px; text-align: right; }
        .form-label { display: block; margin-bottom: 8px; color: var(--cream-d); font-size: 0.9rem; }
        .form-input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: white;
            font-family: inherit;
            outline: none;
        }
        .form-input:focus { border-color: var(--burg-l); }
        textarea.form-input { height: 100px; resize: none; }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--burg-l);
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
        }
        .submit-btn:hover { background: var(--burg); }
        .submit-btn:disabled { background: #444; cursor: not-allowed; }

        #loading-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg);
            display: flex; align-items: center; justify-content: center;
            z-index: 2000; font-size: 1.2rem;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <!-- INTRO SCREEN -->
    <div id="intro-screen">
        <div class="intro-content">
            <div class="intro-title">جدار الذكريات</div>
            <div class="intro-line"></div>
            <div class="intro-subtitle">دفعة 29 — كلية التمريض</div>
        </div>
    </div>

    <div id="loading-overlay" style="display: none;">جاري تحميل الذكريات...</div>

    <div class="container">
        <h1>جدار الذكريات</h1>
        <p class="subtitle">دفعة 29 — كلية التمريض (2026)</p>
        
        <div id="memories-container" class="memories-grid">
            <!-- سيتم تحميل الذكريات هنا -->
        </div>
    </div>

    <!-- Floating Button -->
    <button class="fab" onclick="toggleModal(true)">+</button>

    <!-- Modal Form -->
    <div id="add-modal" class="modal">
        <div class="modal-content">
            <span class="close-modal" onclick="toggleModal(false)">×</span>
            <h2 style="font-family:'Amiri',serif; margin-bottom: 20px; color: var(--burg-l);">أضف ذكرى جديدة</h2>
            
            <div class="form-group">
                <label class="form-label">الاسم الكامل</label>
                <input type="text" id="name-input" class="form-input" placeholder="اكتب اسمك هنا...">
            </div>
            <div class="form-group">
                <label class="form-label">رسالتك / ذكرى</label>
                <textarea id="message-input" class="form-input" placeholder="اكتب شيئاً للذكرى..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">صورة الذكرى</label>
                <input type="file" id="photo-input" class="form-input" accept="image/*">
            </div>
            
            <button id="submit-btn" class="submit-btn" onclick="saveMemory()">نشر الذكرى</button>
        </div>
    </div>

    <script>
        // --- CONFIGURATION ---
        const SUPABASE_URL = 'https://qryfzlsrjbgbalyxdjhd.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFyeWZ6bHNyamJnYmFseXhkamhkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU5MzI4MTMsImV4cCI6MjA5MTUwODgxM30.Ezfy8YQU6Mg6Xx70pDPFNOI2spcSGJU9GOb3q6IMr_s';

        // Initialize Supabase
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Intro Logic
        window.onload = () => {
            setTimeout(() => {
                document.getElementById('intro-screen').classList.add('hidden');
                loadMemories();
            }, 3500); // مدة الإنترو
        };

        function toggleModal(show) {
            document.getElementById('add-modal').classList.toggle('active', show);
        }

        async function loadMemories() {
            const container = document.getElementById('memories-container');
            const loader = document.getElementById('loading-overlay');

            try {
                const { data, error } = await supabaseClient
                    .from('memories')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) throw error;

                container.innerHTML = "";
                
                if (!data || data.length === 0) {
                    container.innerHTML = "<p style='grid-column: 1/-1;'>لا توجد ذكريات منشورة بعد. كن أول من يشارك!</p>";
                } else {
                    data.forEach(item => {
                        const card = `
                            <div class="memory-card" id="memory-${item.id}">
                                <button class="delete-btn" onclick="deleteMemory('${item.id}', '${item.image_url}')" title="حذف">×</button>
                                <img src="${item.image_url}" class="memory-img">
                                <div class="memory-name">${item.name}</div>
                                <div class="memory-msg">${item.message}</div>
                            </div>
                        `;
                        container.innerHTML += card;
                    });
                }
            } catch (err) {
                console.error("Error loading memories:", err);
                container.innerHTML = "<p style='grid-column: 1/-1;'>حدث خطأ أثناء تحميل البيانات. تأكد من إعدادات Supabase.</p>";
            } finally {
                loader.style.display = "none";
            }
        }

        async function saveMemory() {
            const name = document.getElementById('name-input').value.trim();
            const msg = document.getElementById('message-input').value.trim();
            const photoFile = document.getElementById('photo-input').files[0];
            const btn = document.getElementById('submit-btn');

            if (!name || !msg || !photoFile) {
                alert("يرجى إكمال جميع البيانات واختيار صورة.");
                return;
            }

            btn.disabled = true;
            btn.innerText = "جاري النشر...";

            try {
                // 1. Upload Image to Supabase Storage
                const fileExt = photoFile.name.split('.').pop();
                const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                const filePath = `public/${fileName}`;

                const { data: uploadData, error: uploadError } = await supabaseClient.storage
                    .from('photos')
                    .upload(filePath, photoFile);

                if (uploadError) throw uploadError;

                // Get Public URL
                const { data: urlData } = supabaseClient.storage
                    .from('photos')
                    .getPublicUrl(filePath);
                
                const downloadURL = urlData.publicUrl;

                // 2. Save to Supabase Database
                const { error: dbError } = await supabaseClient
                    .from('memories')
                    .insert([
                        { name: name, message: msg, image_url: downloadURL }
                    ]);

                if (dbError) throw dbError;

                alert("تم نشر ذكراك بنجاح!");
                toggleModal(false);
                loadMemories();
                // Reset form
                document.getElementById('name-input').value = '';
                document.getElementById('message-input').value = '';
                document.getElementById('photo-input').value = '';
            } catch (error) {
                console.error("Error saving memory:", error);
                alert("حدث خطأ أثناء النشر.");
                btn.disabled = false;
                btn.innerText = "نشر الذكرى";
            }
        }

        async function deleteMemory(id, imageUrl) {
            if (!confirm("هل أنت متأكد من حذف هذه الذكرى؟")) return;

            try {
                // 1. Delete from Database
                const { error: dbError } = await supabaseClient
                    .from('memories')
                    .delete()
                    .eq('id', id);

                if (dbError) throw dbError;

                // 2. Delete from Storage (Optional but recommended)
                const fileName = imageUrl.split('/').pop();
                const filePath = `public/${fileName}`;
                await supabaseClient.storage.from('photos').remove([filePath]);

                alert("تم حذف الذكرى بنجاح.");
                loadMemories();
            } catch (error) {
                console.error("Error deleting memory:", error);
                alert("حدث خطأ أثناء الحذف.");
            }
        }
    </script>
</body>
</html>
